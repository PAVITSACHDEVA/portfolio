<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Squeeze Pro - Hybrid Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
       <link rel="icon" type="image/svg" href="./Assest/lumixcore.svg">
</head>
<body class="custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { PDFDocument, rgb, degrees, StandardFonts } = PDFLib;

        // 🔹 SERVER CONFIGURATION
        const SERVER_COMPRESS_ENDPOINT = "https://lumix-core-5tl0.onrender.com/api/compress";

        // 🔹 2. TIMEOUT GUARD HELPER
        const fetchWithTimeout = async (url, options = {}, timeout = 60000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (e) {
                clearTimeout(id);
                throw new Error("Server Request Timed Out (Render Cold Start?)");
            }
        };

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const PDFSqueezePro = () => {
            const [activeTab, setActiveTab] = useState('optimize');
            const [files, setFiles] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [statusText, setStatusText] = useState('');
            const [results, setResults] = useState([]);
            const [history, setHistory] = useState([]);
            
            // Settings State
            const [prefix, setPrefix] = useState('squeezed_');
            const [mergeName, setMergeName] = useState('combined_result.pdf');
            const [wmText, setWmText] = useState('DRAFT COPY');
            const [wmOpacity, setWmOpacity] = useState(0.4);
            const [rotateAngle, setRotateAngle] = useState(90);
            const [metaTitle, setMetaTitle] = useState('');
            const [metaAuthor, setMetaAuthor] = useState('');

            const fileInputRef = useRef(null);

            const processBatch = async () => {
                if (files.length === 0) return;
                setIsProcessing(true);
                let processedResults = [];

                try {
                    if (activeTab === 'merge') {
                        setStatusText("Merging documents locally...");
                        const mergedPdf = await PDFDocument.create();
                        for (const file of files) {
                            const bytes = await file.arrayBuffer();
                            const pdf = await PDFDocument.load(bytes);
                            const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                            pages.forEach(p => mergedPdf.addPage(p));
                        }
                        processedResults.push(generateRes(mergeName, await mergedPdf.save(), "MERGE", files.reduce((a,b)=>a+b.size,0)));
                    } 
                    else if (activeTab === 'optimize') {
                        // 🔹 3. BACKEND TOGGLE (Strict Server Compression)
                        for (const file of files) {
                            setStatusText(`Deep Crushing on Server: ${file.name}...`);
                            const formData = new FormData();
                            formData.append("file", file);
                            const response = await fetchWithTimeout(SERVER_COMPRESS_ENDPOINT, { method: "POST", body: formData });
                            if (!response.ok) throw new Error("Server compression failed");
                            const buffer = await response.arrayBuffer();
                            processedResults.push(generateRes(`${prefix}${file.name}`, new Uint8Array(buffer), "OPTIMIZE", file.size));
                        }
                    } else {
                        // LOCAL PROCESSING FOR OTHER TOOLS
                        for (const file of files) {
                            setStatusText(`Processing ${file.name}...`);
                            const bytes = await file.arrayBuffer();
                            const pdfDoc = await PDFDocument.load(bytes, { ignoreEncryption: activeTab === 'unlock' });

                            if (activeTab === 'rotate') {
                                pdfDoc.getPages().forEach(p => p.setRotation(degrees(parseInt(rotateAngle))));
                            } else if (activeTab === 'watermark') {
                                const font = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                                pdfDoc.getPages().forEach(p => {
                                    const { width, height } = p.getSize();
                                    p.drawText(wmText, { x: width/4, y: height/2, size: 50, font, rotate: degrees(45), opacity: parseFloat(wmOpacity), color: rgb(0.5, 0.5, 0.5) });
                                });
                            } else if (activeTab === 'metadata') {
                                pdfDoc.setTitle(metaTitle || "Untitled");
                                pdfDoc.setAuthor(metaAuthor || "User");
                            }
                            
                            processedResults.push(generateRes(file.name, await pdfDoc.save(), activeTab.toUpperCase(), file.size));
                        }
                    }
                    setResults([...processedResults, ...results]);
                    setHistory(prev => [...processedResults, ...prev]);
                } catch (e) {
                    alert("Engine Error: " + e.message);
                } finally {
                    setIsProcessing(false);
                    setFiles([]);
                }
            };

            const generateRes = (name, bytes, type, origSize) => {
                const blob = new Blob([bytes], { type: 'application/pdf' });
                return {
                    id: Math.random().toString(36).substr(2,9),
                    name: name.endsWith('.pdf') ? name : `${name}.pdf`,
                    url: URL.createObjectURL(blob),
                    newSize: (bytes.length / 1024 / 1024).toFixed(2),
                    saving: (100 - (bytes.length / origSize * 100)).toFixed(1),
                    type,
                    timestamp: new Date().toLocaleTimeString()
                };
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col max-w-6xl mx-auto">
                    <header className="mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div>
                            <h1 className="text-4xl font-black italic tracking-tighter uppercase">PDF SQUEEZE PRO</h1>
                            <p className="text-indigo-400 text-[10px] font-bold uppercase tracking-widest mt-2">Hybrid Studio v3.0</p>
                        </div>
                        <nav className="flex bg-slate-900 border border-slate-800 p-1 rounded-2xl overflow-x-auto max-w-full">
                            {['optimize', 'merge', 'rotate', 'metadata', 'unlock', 'watermark'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest ${activeTab === t ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>{t}</button>
                            ))}
                        </nav>
                    </header>

                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-4 space-y-6">
                            <section className="bg-slate-900 border border-slate-800 p-6 rounded-[2rem] space-y-5">
                                <h3 className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Configuration</h3>
                                {activeTab === 'optimize' && <input type="text" value={prefix} onChange={e => setPrefix(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs font-bold" placeholder="Prefix..." />}
                                {activeTab === 'watermark' && <input type="text" value={wmText} onChange={e => setWmText(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs font-bold" placeholder="Stamp text..." />}
                                {activeTab === 'rotate' && <select value={rotateAngle} onChange={e => setRotateAngle(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs font-bold"><option value="90">90° CW</option><option value="180">180°</option><option value="270">270° CW</option></select>}
                                <button onClick={processBatch} disabled={files.length === 0 || isProcessing} className="w-full bg-indigo-600 p-5 rounded-2xl font-black text-xs uppercase hover:bg-indigo-500 transition-all">Run Engine</button>
                            </section>
                        </div>

                        <div className="lg:col-span-8 space-y-6">
                            <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed border-slate-800 p-20 rounded-[3rem] text-center hover:bg-indigo-500/5 cursor-pointer">
                                <input type="file" multiple hidden ref={fileInputRef} onChange={e => setFiles(Array.from(e.target.files))} />
                                <Icon name="upload-cloud" size={32} className="mx-auto mb-4 text-slate-700" />
                                <p className="text-slate-500 font-bold uppercase text-[10px]">Import Source PDFs</p>
                                {files.length > 0 && <p className="mt-4 text-indigo-400 font-black">{files.length} Files Queued</p>}
                            </div>

                            <div className="space-y-3 h-[400px] overflow-y-auto custom-scrollbar">
                                {results.map(res => (
                                    <div key={res.id} className="bg-slate-900 border border-slate-800 p-5 rounded-3xl flex justify-between items-center">
                                        <div>
                                            <p className="text-xs font-black uppercase truncate max-w-[200px]">{res.name}</p>
                                            <p className="text-[9px] text-indigo-400 font-bold uppercase mt-1">{res.type} • {res.newSize} MB • -{res.saving}%</p>
                                        </div>
                                        <a href={res.url} download={res.name} className="bg-indigo-600 p-3 rounded-xl"><Icon name="download" size={14} /></a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* 🔹 1. HONEST FOOTER */}
                    <footer className="mt-20 pt-10 border-t border-slate-900 text-center pb-12">
                        <p className="text-[9px] font-black text-slate-700 uppercase tracking-[0.6em]">
                            Hybrid mode: local tools + secure server compression
                        </p>
                    </footer>

                    {isProcessing && (
                        <div className="fixed inset-0 bg-slate-950/90 flex flex-col items-center justify-center z-[100]">
                            <div className="w-12 h-12 border-4 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
                            <p className="text-[10px] font-black uppercase tracking-widest">{statusText}</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PDFSqueezePro />);
    </script>
</body>
</html>
